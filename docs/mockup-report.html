<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0, maximum-scale=1.0">
<title>yadocho - 月次レポート 磨きモックアップ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&family=Noto+Serif+JP:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --color-bg: #FAF6F0;
    --color-bg-card: #F5EDE3;
    --color-bg-secondary: #F0EDE8;
    --color-text: #2D2926;
    --color-text-body: #5C5552;
    --color-text-sub: #9B9490;
    --color-primary: #C4694A;
    --color-primary-hover: #A85638;
    --color-checkin: #5B9A6E;
    --color-booked: #E8A65D;
    --color-error: #D47B7B;
    --font-heading: 'Noto Serif JP', serif;
    --font-body: 'Noto Sans JP', sans-serif;
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 16px;
    --radius-full: 9999px;
    --shadow-card: 6px 6px 12px rgba(180,170,158,0.25), -4px -4px 10px rgba(255,255,255,0.7);
    --shadow-button: 0 4px 12px rgba(196,105,74,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-body);
    background: var(--color-bg);
    color: var(--color-text);
    width: 390px;
    margin: 0 auto;
    min-height: 844px;
    position: relative;
    padding-bottom: 80px;
  }

  /* === Header === */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    background: var(--color-bg);
    z-index: 10;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .back-btn {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: none;
    color: var(--color-text);
    cursor: pointer;
    border-radius: var(--radius-sm);
  }
  .page-title {
    font-size: 20px;
    font-weight: 500;
    font-family: var(--font-heading);
  }
  .print-btn {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: none;
    color: var(--color-text-sub);
    cursor: pointer;
    border-radius: var(--radius-sm);
  }

  /* === Month Nav === */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 4px 20px 16px;
  }
  .month-nav button {
    width: 40px;
    height: 40px;
    border: none;
    background: var(--color-bg-card);
    border-radius: var(--radius-sm);
    color: var(--color-text-sub);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 2px 2px 6px rgba(180,170,158,0.15), -2px -2px 4px rgba(255,255,255,0.5);
    transition: transform 120ms;
  }
  .month-nav button:active { transform: scale(0.95); }
  .month-nav .month-text {
    font-size: 18px;
    font-weight: 500;
    font-family: var(--font-heading);
    color: var(--color-text);
  }

  /* === Content === */
  .content { padding: 0 20px; }

  /* === KPI Row === */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .kpi-card {
    background: var(--color-bg-card);
    border-radius: var(--radius-lg);
    padding: 16px 12px;
    text-align: center;
    box-shadow: var(--shadow-card);
    border: 1px solid rgba(255,255,255,0.5);
    cursor: pointer;
    transition: transform 120ms;
  }
  .kpi-card:active { transform: scale(0.97); }
  .kpi-value {
    font-size: 32px;
    font-weight: 500;
    color: var(--color-primary);
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .kpi-label {
    font-size: 13px;
    color: var(--color-text-sub);
    font-weight: 500;
  }

  /* === Section Cards === */
  .card {
    background: var(--color-bg-card);
    border-radius: var(--radius-lg);
    padding: 20px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-card);
    border: 1px solid rgba(255,255,255,0.5);
  }
  .card-title {
    font-size: 17px;
    font-weight: 500;
    color: var(--color-text);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title svg {
    width: 18px;
    height: 18px;
    color: var(--color-primary);
  }

  /* Data rows */
  .data-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 10px 0;
    border-bottom: 1px solid rgba(0,0,0,0.04);
  }
  .data-row:last-child { border-bottom: none; }
  .data-label {
    font-size: 16px;
    color: var(--color-text-body);
  }
  .data-value {
    font-size: 16px;
    font-weight: 500;
    color: var(--color-text);
    text-align: right;
  }

  /* Total row */
  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 14px 0 4px;
    margin-top: 4px;
    border-top: 2px solid rgba(0,0,0,0.08);
  }
  .total-label {
    font-size: 17px;
    font-weight: 500;
    color: var(--color-text);
  }
  .total-value {
    font-size: 28px;
    font-weight: 500;
    color: var(--color-text);
  }

  /* === Mini Chart === */
  .chart-area {
    margin: 16px 0 4px;
    height: 80px;
    display: flex;
    align-items: flex-end;
    gap: 4px;
    padding: 0 4px;
  }
  .chart-bar {
    flex: 1;
    background: linear-gradient(180deg, var(--color-primary) 0%, rgba(196,105,74,0.6) 100%);
    border-radius: 4px 4px 0 0;
    min-height: 4px;
    transition: height 300ms ease-out;
    position: relative;
  }
  .chart-bar:hover {
    opacity: 0.8;
  }
  .chart-bar.highlight {
    background: linear-gradient(180deg, var(--color-booked) 0%, rgba(232,166,93,0.6) 100%);
  }
  .chart-labels {
    display: flex;
    gap: 4px;
    padding: 4px 4px 0;
  }
  .chart-labels span {
    flex: 1;
    text-align: center;
    font-size: 11px;
    color: var(--color-text-sub);
  }

  /* === Link Cards === */
  .link-card {
    background: var(--color-bg-card);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    margin-bottom: 10px;
    box-shadow: var(--shadow-card);
    border: 1px solid rgba(255,255,255,0.5);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: transform 120ms;
    min-height: 56px;
  }
  .link-card:active { transform: scale(0.98); }
  .link-card-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .link-card-icon {
    width: 36px;
    height: 36px;
    background: rgba(196,105,74,0.08);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-primary);
  }
  .link-card-icon svg { width: 20px; height: 20px; }
  .link-card-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--color-text);
  }
  .link-card-sub {
    font-size: 13px;
    color: var(--color-text-sub);
    margin-top: 1px;
  }
  .link-card-arrow {
    color: var(--color-text-sub);
    font-size: 18px;
  }

  /* === Print Button === */
  .btn-primary {
    width: 100%;
    min-height: 56px;
    background: var(--color-primary);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    font-size: 17px;
    font-weight: 500;
    font-family: var(--font-body);
    letter-spacing: 0.04em;
    cursor: pointer;
    box-shadow: var(--shadow-button);
    transition: transform 120ms ease-out;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 8px;
    margin-bottom: 16px;
  }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary svg { width: 20px; height: 20px; }

  /* === Bottom Tab Bar === */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 390px;
    height: 64px;
    background: var(--color-bg);
    border-top: 1px solid rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    justify-content: space-around;
    z-index: 100;
  }
  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    color: var(--color-text-sub);
    text-decoration: none;
    min-width: 56px;
    min-height: 48px;
    justify-content: center;
  }
  .tab-item svg { width: 24px; height: 24px; }
  .tab-item span { font-size: 13px; font-weight: 500; }
  .fab {
    width: 64px;
    height: 64px;
    background: var(--color-primary);
    border-radius: var(--radius-full);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    margin-top: -24px;
    box-shadow: 0 4px 12px rgba(196,105,74,0.4);
  }
  .fab svg { width: 28px; height: 28px; }
</style>
</head>
<body>

<!-- Header -->
